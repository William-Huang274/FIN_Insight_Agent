version: "v0.2"
purpose: "Sector depth packs for cross-industry investment research coverage."
selection_policy:
  status: "candidate_until_availability_probe"
  accepted_only_if:
    - "fy2023_fy2025_10k_available_or_source_gap_recorded"
    - "latest_10q_available_or_source_gap_recorded"
    - "earnings_8k_available_or_source_gap_recorded"
    - "market_snapshot_available_or_source_gap_recorded"
    - "primary_metric_families_parseable_or_gap_recorded"
  notes:
    - "Packs are not automatically merged into the main universe."
    - "Use full78 for baseline smoke, full128_us for broad US coverage, then activate selected sector packs."
  accepted_ticker_adjustments:
    - legacy_ticker: "HES"
      accepted_ticker: "APA"
      reason: "HES no longer has a current SEC/Yahoo ticker path in the 2026-05-29 probe; APA preserves upstream E&P sector depth without duplicating the current full128/sector universe."
    - legacy_ticker: "IPG"
      accepted_ticker: "TTD"
      reason: "IPG no longer has a current SEC/Yahoo ticker path in the 2026-05-29 probe; TTD preserves advertising/media demand exposure."
    - legacy_ticker: "MMC"
      accepted_ticker: "MRSH"
      reason: "SEC current ticker reference maps Marsh & McLennan to MRSH."
    - legacy_ticker: "PARA"
      accepted_ticker: "FOXA"
      reason: "PARA no longer has a current SEC/Yahoo ticker path in the 2026-05-29 probe; FOXA preserves media/content exposure with current SEC/Yahoo coverage."
  cik_overrides:
    CTRA: "0000858470"

packs:
  - pack_id: "technology_ai_infrastructure_depth"
    industry_group: "information_technology"
    research_questions:
      - "AI infrastructure demand transmission from chips to servers, networking, EDA, equipment, power, cooling, and software."
      - "Whether cloud capex and enterprise software demand support valuation and margin assumptions."
    candidate_tickers:
      p0: ["DELL", "HPE", "SMCI", "ANET", "MRVL", "LRCX", "KLAC", "SNPS", "CDNS", "NOW", "IBM"]
      p1: ["VRT", "ETN", "PWR", "VST", "COHR", "CIEN", "MPWR", "TER", "APH", "GLW"]
    primary_metric_families:
      - "revenue"
      - "segment_revenue"
      - "gross_margin"
      - "operating_margin"
      - "orders_backlog"
      - "capex"
      - "rpo_deferred_revenue"
      - "inventory"
    required_source_families:
      - "us_primary_annual_10k"
      - "us_primary_interim_10q"
      - "us_company_authored_8k_earnings"
      - "market_snapshot"
      - "industry_housing_real_estate_power"
      - "industry_utilities_power_demand"

  - pack_id: "financial_services_depth"
    industry_group: "financials"
    research_questions:
      - "Interest-rate cycle, deposit cost, credit quality, capital markets activity, insurance pricing, and asset-management flows."
    candidate_tickers:
      p0: ["C", "WFC", "GS", "SCHW", "COF", "CB"]
      p1: ["ICE", "CME", "BK", "PNC", "USB", "MRSH", "AON", "TRV", "MCO", "BX"]
