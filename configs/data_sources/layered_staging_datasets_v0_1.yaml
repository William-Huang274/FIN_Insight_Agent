schema_version: fin_agent_layered_staging_datasets_v0_1
purpose: Keep expanded primary disclosures in appendable staging shards before promotion to the mainline evidence and vector indexes.
promotion_policy:
  staging_only_until_relationship_gates_pass: true
  preserve_source_family_boundaries: true
  allow_incremental_non_us_append: true
  mainline_index_overwrite_allowed: false
datasets:
  tier1_plus_global_primary_disclosure_v0_1:
    description: Appendable primary-disclosure dataset for S&P 500 SEC annual filings plus later non-US official annual reports.
    namespace: tier1_plus_global_primary_disclosure
    source_shards:
      sec_tier1_sp500_us_annual_v0_1:
        status: active
        source_family: sec_primary_filing
        source_tier: primary_sec_filing
        source_type: 10-K
        universe_manifest: data/manifests/tier1_sp500_plus_current_manifest.jsonl
        download_config: configs/data_sources/tier1_sp500_us_annual_10k_fy2023_2025.yaml
        raw_root: data/raw_private/sec_tier1_sp500_annual
        filing_manifest: data/staging/sec_tier1_sp500_annual/manifests/tier1_sp500_us_annual_10k_manifest_fy2023_2025_v0_1.jsonl
        chunks: data/staging/sec_tier1_sp500_annual/chunks/tier1_sp500_us_annual_10k_chunks_fy2023_2025_v0_1.jsonl
        evidence: data/staging/sec_tier1_sp500_annual/evidence/tier1_sp500_us_annual_10k_evidence_fy2023_2025_v0_1.jsonl
        structured_dir: data/staging/sec_tier1_sp500_annual/structured_objects
        structured_prefix: tier1_sp500_us_annual_10k_fy2023_2025_v0_1
        bm25_index_dir: data/indexes/staging/bm25/tier1_sp500_us_annual_10k_fy2023_2025_v0_1
        object_bm25_index_dir: data/indexes/staging/bm25/tier1_sp500_us_annual_10k_objects_fy2023_2025_v0_1
        object_sqlite_fts_path: data/indexes/staging/sqlite_fts/tier1_sp500_us_annual_10k_objects_fy2023_2025_v0_1.sqlite
        milvus_dir: data/indexes/staging/milvus/tier1_sp500_us_annual_10k_fy2023_2025_v0_1
      sec_tier1_sp500_us_interim_10q_v0_1:
        status: active_config_ready
        source_family: sec_primary_filing
        source_tier: primary_sec_filing
        source_type: 10-Q
        universe_manifest: data/manifests/tier1_sp500_plus_current_manifest.jsonl
        download_config: configs/data_sources/tier1_sp500_us_interim_10q_fy2026_2027.yaml
        raw_root: data/raw_private/sec_tier1_sp500_interim_10q
        filing_manifest: data/staging/sec_tier1_sp500_interim_10q/manifests/tier1_sp500_us_interim_10q_manifest_fy2026_2027_v0_1.jsonl
        chunks: data/staging/sec_tier1_sp500_interim_10q/chunks/tier1_sp500_us_interim_10q_chunks_fy2026_2027_v0_1.jsonl
        evidence: data/staging/sec_tier1_sp500_interim_10q/evidence/tier1_sp500_us_interim_10q_evidence_fy2026_2027_v0_1.jsonl
        structured_dir: data/staging/sec_tier1_sp500_interim_10q/structured_objects
        structured_prefix: tier1_sp500_us_interim_10q_fy2026_2027_v0_1
        bm25_index_dir: data/indexes/staging/bm25/tier1_sp500_us_interim_10q_fy2026_2027_v0_1
        object_sqlite_fts_path: data/indexes/staging/sqlite_fts/tier1_sp500_us_interim_10q_objects_fy2026_2027_v0_1/records.sqlite
