services:
  workbench:
    build:
      context: .
      dockerfile: Dockerfile
      target: workbench-backend
      args:
        REQUIREMENTS_FILE: requirements-workbench.txt
        WORKBENCH_IMAGE_KIND: backend
        WORKBENCH_RUNTIME_PROFILE: control-plane
    image: finsight-workbench:compose
    ports:
      - "127.0.0.1:8765:8765"
    environment:
      PYTHONUNBUFFERED: "1"
      WORKBENCH_IMAGE_KIND: backend
      WORKBENCH_RUNTIME_PROFILE: control-plane
      WORKBENCH_SCRIPT_UPDATE_MODE: image_rebuild
      WORKBENCH_DATA_UPDATE_MODE: data_build_jobs
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      FMP_API_KEY: "${FMP_API_KEY:-}"
    volumes:
      - ${WORKBENCH_CONFIGS_MOUNT:-./configs}:/app/configs
      - ${WORKBENCH_DATA_MOUNT:-./data}:/app/data
      - ${WORKBENCH_REPORTS_MOUNT:-./reports}:/app/reports
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/health/ready', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
