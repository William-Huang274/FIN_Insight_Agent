name: docker-smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - requirements-workbench.txt
      - compose.yaml
      - compose.runtime.yaml
      - apps/workbench/**
      - scripts/workbench/**
      - src/sec_agent/workbench/**
      - .github/workflows/docker-smoke.yml
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .dockerignore
      - requirements-workbench.txt
      - compose.yaml
      - compose.runtime.yaml
      - apps/workbench/**
      - scripts/workbench/**
      - src/sec_agent/workbench/**
      - .github/workflows/docker-smoke.yml

jobs:
  workbench-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Workbench image
        run: |
          docker build \
            --target workbench-backend \
            --build-arg REQUIREMENTS_FILE=requirements-workbench.txt \
            -t finsight-workbench:ci \
            .

      - name: Validate Compose configs
        run: |
          docker compose -f compose.yaml config
          docker compose -f compose.yaml -f compose.runtime.yaml config

      - name: Start Workbench container
        run: |
          docker run --rm -d \
            --name finsight-workbench-ci \
            -p 127.0.0.1:8765:8765 \
            finsight-workbench:ci

      - name: Wait for health and readiness endpoints
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8765/api/health \
              && curl -fsS http://127.0.0.1:8765/api/health/ready \
              && curl -fsS http://127.0.0.1:8765/api/system/contracts; then
              exit 0
            fi
            docker logs finsight-workbench-ci || true
            sleep 2
          done
          docker logs finsight-workbench-ci || true
          exit 1

      - name: Stop Workbench container
        if: always()
        run: |
          docker stop finsight-workbench-ci || true
