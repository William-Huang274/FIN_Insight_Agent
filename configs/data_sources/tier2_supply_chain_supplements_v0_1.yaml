schema_version: fin_agent_tier2_supply_chain_supplements_v0_1
purpose: Supplement S&P 500 plus current coverage with public-company issuers that are important for sector-depth and upstream/downstream supply-chain analysis, including SEC issuers and non-US issuers with comparable public annual or exchange filings.
promotion_role: sector_depth_supply_chain_supplement
selection_policy:
  include_only_if:
    - SEC ticker/CIK can be resolved, or a non-US public disclosure profile has an official annual-report or exchange-filing source.
    - Company improves a named supply-chain or sector-depth coverage gap.
    - Company is not already covered by Tier 1 unless it needs a role tag for audit only.
  use_boundary:
    - Tier 2 supplements are not a replacement for Tier 1 broad-market coverage.
    - Foreign issuers must preserve 20-F/40-F/6-K source-family boundaries.
    - Non-US public annual reports, exchange filings, and regulator filings are primary company disclosure when source provenance is preserved.
    - Non-reporting private strategic nodes remain source candidates, not main evidence companies.
source_priority_policy:
  - SEC 10-K, 10-Q, 20-F, 40-F, and 6-K stay in the SEC ingestion path.
  - Non-US official annual reports, exchange filings, and regulator filings use the global public disclosure ingestion path.
  - Company IR pages are used as source locators; the report document or exchange filing remains the cited evidence.
  - News, press, websites, and private-company pages are lead evidence unless corroborated by primary disclosure.

